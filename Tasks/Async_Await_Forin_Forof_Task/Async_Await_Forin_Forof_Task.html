<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Record Processing System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    #log {
      margin: 20px auto;
      padding: 15px;
      width: 80%;
      max-width: 600px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: left;
      min-height: 100px;
    }

    .result-container {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .pass {
      color: green;
      font-weight: bold;
    }

    .fail {
      color: red;
      font-weight: bold;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Student Record Processing System</h1>
  <button onclick="processAllStudents()">Start Processing</button>

  <div id="log"></div>

  <div class="result-container" id="results"></div>

  <script>
    const students = {
      student1: {
        name: "Alice",
        marks: { math: 85, science: 90, english: 78 }
      },
      student2: {
        name: "Bob",
        marks: { math: 75, science: 80, english: 88 }
      },
      student3: {
        name: "Charlie",
        marks: { math: 95, science: 89, english: 92 }
      },
      student4: {
        name: "David",
        marks: null // Error case
      }
    };

    const logDiv = document.getElementById("log");
    const resultsDiv = document.getElementById("results");

    function log(message) {
      const p = document.createElement("p");
      p.textContent = message;
      logDiv.appendChild(p);
    }

    function processStudent(student) {
      return new Promise((resolve, reject) => {
        const delay = Math.floor(Math.random() * 1000) + 500;

        setTimeout(() => {
          try {
            log(`Processing student: ${student.name}...`);

            if (!student.marks) {
              throw new Error("Marks data missing");
            }

            let total = 0;
            let count = 0;

            for (let subject in student.marks) {
              total += student.marks[subject];
              count++;
            }

            const average = total / count;

            resolve({
              name: student.name,
              average: average.toFixed(2),
              status: average >= 80 ? "Pass" : "Fail"
            });

          } catch (error) {
            reject(`Error processing ${student.name}: ${error.message}`);
          }
        }, delay);
      });
    }

    async function processAllStudents() {
      logDiv.innerHTML = "";
      resultsDiv.innerHTML = "";

      const results = [];

      for (let key in students) {
        try {
          const result = await processStudent(students[key]);
          results.push(result);
        } catch (error) {
          log(error);
        }
      }

      // Display results
      for (let student of results) {
        const card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
          <h3>${student.name}</h3>
          <p>Average: ${student.average}</p>
          <p class="${student.status === 'Pass' ? 'pass' : 'fail'}">
            ${student.status}
          </p>
        `;

        resultsDiv.appendChild(card);
      }
    }
  </script>

</body>
</html>
